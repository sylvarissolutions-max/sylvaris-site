<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#060610"/>
            <stop offset="100%" stop-color="#0b0b18"/>
        </linearGradient>
        <radialGradient id="glow" cx="75%" cy="40%" r="50%">
            <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
            <stop offset="60%" stop-color="#6366f1" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#818cf8"/>
            <stop offset="50%" stop-color="#6366f1"/>
            <stop offset="100%" stop-color="#4338ca"/>
        </linearGradient>
        <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#818cf8"/>
            <stop offset="100%" stop-color="#6366f1"/>
        </linearGradient>
        <pattern id="grid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
            <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1"/>
        </pattern>
    </defs>

    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#grid)"/>
    <rect width="1200" height="630" fill="url(#glow)"/>

    <g transform="translate(80, 80)">
        <rect width="48" height="48" rx="10" fill="url(#mark)"/>
        <text x="24" y="33" font-family="Inter, system-ui" font-weight="700" font-size="26" fill="white" text-anchor="middle">S</text>
        <text x="68" y="34" font-family="Inter, system-ui" font-weight="600" font-size="22" fill="#ececf4">Sylvaris</text>
    </g>

    <g transform="translate(80, 220)">
        <rect x="0" y="-2" width="3" height="28" fill="#6366f1" rx="2"/>
        <text x="18" y="18" font-family="JetBrains Mono, ui-monospace" font-size="18" font-weight="500" fill="#818cf8" letter-spacing="2">SYLVARIS SOLUTIONS LLC</text>
    </g>

    <g transform="translate(80, 280)">
        <text x="0" y="72" font-family="Inter, system-ui" font-size="76" font-weight="600" fill="#ececf4" letter-spacing="-3">Enterprise AI systems,</text>
        <text x="0" y="156" font-family="Inter, system-ui" font-size="76" font-weight="600" fill="#ececf4" letter-spacing="-3">deployed in weeks.</text>
    </g>

    <g transform="translate(80, 510)">
        <text x="0" y="0" font-family="Inter, system-ui" font-size="22" fill="#8c8ca3">Fixed scope. Fixed fee. Live in 2 to 4 weeks.</text>
    </g>

    <g transform="translate(80, 560)">
        <circle cx="6" cy="8" r="4" fill="#6366f1"/>
        <text x="18" y="14" font-family="JetBrains Mono, ui-monospace" font-size="13" fill="#585868">sylvarissolutions.com</text>
    </g>
</svg>
